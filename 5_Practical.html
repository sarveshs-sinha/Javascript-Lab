// 1. JavaScript Events

<!DOCTYPE html>
<html>
<head>
    <title>JavaScript Events</title>
</head>
<body>

    <h2 id="text">Welcome</h2>

    <button onclick="changeText()">
        Click Here
    </button>

    <script>

        function changeText() {

            document.getElementById("text").innerHTML =
            "Button Clicked";

        }

    </script>

</body>
</html>

// 2. Conditional Logic

<!DOCTYPE html>
<html>
<head>
    <title>Conditional Logic</title>
</head>
<body>

    <script>

        let age = 20;

        if(age >= 18) {

            document.write("You can vote");

        }
        else {

            document.write("You cannot vote");

        }

    </script>

</body>
</html>

// 3. Loop Example

<!DOCTYPE html>
<html>
<head>
    <title>Loop Example</title>
</head>
<body>

    <script>

        for(let i = 1; i <= 5; i++) {

            document.write("Number: " + i + "<br>");

        }

    </script>

</body>
</html>
