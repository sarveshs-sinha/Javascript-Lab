// 1. JavaScript Events

<!DOCTYPE html>
<html>
<head>
    <title>JavaScript Events</title>
</head>
<body>

    <h2 id="text">Welcome</h2>

    <button onclick="changeText()">
        Click Here
    </button>

    <script>

        function changeText() {

            document.getElementById("text").innerHTML =
            "Button Clicked";

        }

    </script>

</body>
</html>
